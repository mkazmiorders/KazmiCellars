<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine Regions — Kazmi Cellars</title>
<link rel="stylesheet" href="style.css" />
<style>
.gp-hero, .gp-filters, .grid-section, .gp-overlay, .gp-panel, .gp-card { box-sizing: border-box; }
:root {
  --gp-cream: #f5f0e8; --gp-dark: #2c1810; --gp-mid: #6b3f26;
  --gp-tan: #d4c4a8; --gp-burg: #722F37; --gp-gold: #8b6914;
  --gp-goldL: #ede8dc; --gp-alt: #ede8dc; --gp-white: #faf8f4;
  --gp-serif: 'Cormorant Garamond', Georgia, serif;
  --gp-sans: 'Raleway', Georgia, sans-serif;
}

/* ── PAGE HEADER (matches site) ── */
.gp-intro { font-size: .95rem; color: var(--text-mid); line-height: 1.8; max-width: 580px; margin: 1rem auto 0; text-align: center; font-family: 'Raleway', sans-serif; }
.gp-hero-dl { display: inline-flex; align-items: center; gap: 8px; margin-top: 1.4rem; padding: 11px 24px; background: var(--gp-gold); color: #fff; font-family: var(--gp-sans); font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; border-radius: 2px; text-decoration: none; transition: opacity .15s; }
.gp-hero-dl:hover { opacity: .88; }

/* ── FILTERS ── */
.gp-filters {
  background: var(--gp-alt);
  border-bottom: 1px solid var(--gp-tan);
  padding: 14px 32px;
  display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
.filter-label { font-size: 10px; font-weight: bold; letter-spacing: .15em; text-transform: uppercase; color: var(--gp-mid); margin-right: 4px; font-family: var(--gp-sans); }
.filter-btn {
  font-family: var(--gp-sans); font-size: 11px;
  padding: 6px 14px; border: 1px solid var(--gp-tan);
  background: var(--gp-cream); color: var(--gp-mid);
  border-radius: 2px; cursor: pointer; transition: all .18s; letter-spacing: .04em;
}
.filter-btn:hover { border-color: var(--gp-gold); color: var(--gp-dark); }
.filter-btn.active { background: var(--gp-burg); color: var(--gp-white); border-color: var(--gp-burg); }

/* ── GRID ── */
.grid-section { padding: 28px 32px 48px; }
.region-count { font-style: italic; font-size: 12px; color: var(--gp-mid); margin-bottom: 18px; font-family: var(--gp-serif); }
.gp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }

/* ── REGION CARD ── */
.gp-card {
  background: var(--gp-white);
  border: 1px solid var(--gp-tan);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}
.gp-card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(44,26,14,0.12); }
.card-header {
  padding: 16px 16px 12px;
  color: var(--gp-dark);
  position: relative;
}
.card-kz { font-style: italic; font-size: 8px; color: var(--gp-gold); letter-spacing: .1em; }
.card-name { font-family: var(--gp-serif); font-weight: 600; font-size: 19px; line-height: 1.15; margin: 4px 0 3px; }
.card-country { font-style: italic; font-size: 10.5px; color: var(--gp-mid); font-family: var(--gp-serif); }
.card-tagline { font-style: italic; font-size: 9.5px; color: var(--gp-mid); margin-top: 6px; line-height: 1.4; font-family: var(--gp-serif); }
.card-body { padding: 12px 16px; background: var(--gp-cream); }
.card-facts { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
.card-fact { }
.fact-lbl { font-size: 8px; font-weight: bold; letter-spacing: .12em; text-transform: uppercase; color: var(--gp-mid); font-family: var(--gp-sans); }
.fact-val { font-size: 10px; color: var(--gp-dark); margin-top: 1px; font-family: var(--gp-sans); }
.card-climate { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.clim-row { display: flex; align-items: center; gap: 8px; }
.clim-lbl { font-size: 8.5px; color: var(--gp-mid); width: 52px; flex-shrink: 0; font-style: italic; font-family: var(--gp-serif); }
.clim-track { flex: 1; height: 7px; background: #E8E0D4; border-radius: 4px; position: relative; overflow: visible; }
.clim-fill { height: 100%; border-radius: 4px; }
.clim-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid white; position: absolute; top: -2.5px; transform: translateX(-50%); box-shadow: 0 1px 4px rgba(0,0,0,.2); }
.card-grapes { display: flex; flex-wrap: wrap; gap: 4px; }
.grape-chip { font-style: italic; font-size: 8.5px; padding: 2px 7px; border-radius: 2px; color: white; font-family: var(--gp-serif); }
.grape-chip.red { background: #6B1A1A; }
.grape-chip.white { background: #1A3A5C; }

/* ── DETAIL PANEL ── */
.gp-overlay {
  position: fixed; inset: 0; background: rgba(44,26,14,.45);
  z-index: 2000; opacity: 0; pointer-events: none; transition: opacity .25s;
}
.gp-overlay.open { opacity: 1; pointer-events: all; }
.gp-panel {
  position: fixed; top: 0; right: 0; height: 100vh;
  width: min(640px, 100vw);
  background: var(--gp-cream);
  z-index: 2001;
  overflow-y: auto;
  transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.gp-panel.open { transform: translateX(0); }
.panel-header { padding: 20px 24px 16px; color: var(--gp-dark); position: sticky; top: 0; z-index: 5; background: var(--gp-alt); border-bottom: 1px solid var(--gp-tan); }
.panel-kz { font-style: italic; font-size: 9px; color: var(--gp-gold); }
.panel-name { font-family: var(--gp-serif); font-weight: 600; font-size: 28px; line-height: 1.1; margin: 6px 0 4px; }
.panel-country { font-style: italic; font-size: 11.5px; color: var(--gp-mid); font-family: var(--gp-serif); }
.panel-tagline { font-style: italic; font-size: 10.5px; color: var(--gp-mid); margin-top: 6px; line-height: 1.5; font-family: var(--gp-serif); }
.panel-close {
  position: absolute; top: 16px; right: 20px;
  background: rgba(0,0,0,.06); border: none; color: var(--gp-dark);
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  font-size: 18px; display: flex; align-items: center; justify-content: center;
}
.panel-close:hover { background: rgba(0,0,0,.12); }

.panel-body { padding: 0 24px 32px; }
.panel-swatch { display: flex; height: 14px; margin: 0 -24px; }
.swatch-seg { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 5px; color: white; font-style: italic; }

/* Panel sections */
.p-sec { margin-top: 20px; }
.p-sec-hdr {
  font-size: 8px; font-weight: bold; letter-spacing: .2em; text-transform: uppercase;
  color: var(--gp-gold); background: transparent;
  padding: 0 0 5px; margin: 0 0 10px; border-bottom: 1px solid var(--gp-tan); font-family: var(--gp-sans);
}
.p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.p-fact { padding: 7px 10px; border-bottom: 1px solid var(--gp-tan); }
.p-fact:nth-child(odd) { background: var(--gp-alt); border-right: 1px solid var(--gp-tan); }
.p-fact:nth-child(even) { background: var(--gp-cream); }
.p-lbl { font-size: 8px; font-weight: bold; color: var(--gp-mid); font-family: var(--gp-sans); }
.p-val { font-size: 10px; color: var(--gp-dark); margin-top: 2px; font-family: var(--gp-sans); }

/* Radar chart */
.radar-climate-row { display: flex; gap: 16px; align-items: flex-start; margin-top: 4px; }
.radar-wrap { flex: 1; }
.climate-wrap { flex: 1; }
.climate-bars { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
.c-bar-row { }
.c-bar-lbl { display: flex; justify-content: space-between; font-size: 9.5px; color: var(--gp-mid); margin-bottom: 5px; font-family: var(--gp-serif); }
.c-bar-lbl span { font-style: italic; }
.c-bar-track { height: 10px; background: #E8E0D4; border-radius: 5px; position: relative; }
.c-bar-fill { height: 100%; border-radius: 5px; }
.c-bar-dot { width: 16px; height: 16px; border-radius: 50%; border: 2.5px solid white; position: absolute; top: -3px; transform: translateX(-50%); box-shadow: 0 2px 6px rgba(0,0,0,.2); }

/* Story text */
.story-text { font-size: 11px; line-height: 1.75; color: var(--gp-dark); text-align: justify; font-family: var(--gp-sans); }
.story-text + .story-text { margin-top: 10px; }

/* Chip grids */
.chip-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.p-chip { font-style: italic; font-size: 9.5px; padding: 3px 9px; border-radius: 2px; color: white; font-family: var(--gp-serif); }
.p-chip.red { background: #6B1A1A; }
.p-chip.white { background: #1A3A5C; }
.soil-chip { font-style: italic; font-size: 9.5px; padding: 3px 9px; border-radius: 2px; color: white; font-family: var(--gp-serif); }
.sub-chip { font-style: italic; font-size: 9.5px; padding: 3px 9px; border-radius: 2px; color: var(--gp-dark); background: var(--gp-alt); border: 1px solid var(--gp-tan); font-family: var(--gp-serif); }

/* Quote */
.p-quote {
  font-style: italic; font-size: 12px; line-height: 1.6;
  color: var(--gp-dark); background: var(--gp-goldL);
  border-left: 3px solid var(--gp-gold);
  padding: 12px 16px; margin-top: 20px; font-family: var(--gp-serif);
}

@media (max-width: 640px) {
  .gp-filters { padding: 10px 16px; }
  .grid-section { padding: 20px 16px 40px; }
  .panel-body { padding: 0 16px 24px; }
  .panel-swatch { margin: 0 -16px; }
  .radar-climate-row { flex-direction: column; }
}
</style>
</head>

// ── UTILS ─────────────────────────────────────────────────────────────────────
const countries = [...new Set(REGIONS.map(r => r.country))];

function climateBar(score, fillColor, label, endLabel) {
  const pct = (score / 5) * 100;
  return `<div class="c-bar-row">
    <div class="c-bar-lbl"><span>${label}</span><span>${endLabel}</span></div>
    <div class="c-bar-track">
      <div class="c-bar-fill" style="width:${pct}%;background:${fillColor};"></div>
      <div class="c-bar-dot" style="left:${pct}%;background:${fillColor};"></div>
    </div>
  </div>`;
}

function radarSVG(scores, labels, color, size=180) {
  const cx = size/2, cy = size/2, r = size*0.36;
  const n = scores.length;
  const toXY = (i, frac) => {
    const a = Math.PI/2 - i * 2*Math.PI/n;
    return [cx + r*frac*Math.cos(a), cy - r*frac*Math.sin(a)];
  };
  let rings = '';
  [0.25,0.5,0.75,1.0].forEach(f => {
    const pts = Array.from({length:n},(_,i)=>toXY(i,f).join(',')).join(' ');
    rings += `<polygon points="${pts}" fill="none" stroke="#E0D8CE" stroke-width="0.5"/>`;
  });
  let axes = '';
  for(let i=0;i<n;i++){
    const [x,y]=toXY(i,1);
    axes += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#C8C0B8" stroke-width="0.4"/>`;
  }
  const dataPts = scores.map((s,i) => {
    const frac = Math.max(0.07,(s-1)/4*0.9+0.1);
    return toXY(i,frac);
  });
  const polyPts = dataPts.map(p=>p.join(',')).join(' ');
  const hex = color;
  const r2 = parseInt(hex.slice(1,3),16), g2 = parseInt(hex.slice(3,5),16), b2 = parseInt(hex.slice(5,7),16);
  const fillCol = `rgba(${r2},${g2},${b2},0.18)`;
  let dots = dataPts.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="3" fill="${color}"/>`).join('');
  let lbls = '';
  for(let i=0;i<n;i++){
    const [x,y]=toXY(i,1.28);
    const anchor = x<cx-5?'end':x>cx+5?'start':'middle';
    lbls += `<text x="${x}" y="${y+3}" text-anchor="${anchor}" font-size="7.5" font-family="Georgia" fill="#6B4C2A" font-weight="bold">${labels[i].toUpperCase()}</text>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;margin:auto;">
    <polygon points="${Array.from({length:n},(_,i)=>toXY(i,1).join(',')).join(' ')}" fill="#FAF7F2"/>
    ${rings}${axes}
    <polygon points="${polyPts}" fill="${fillCol}" stroke="${color}" stroke-width="1.8"/>
    ${dots}${lbls}
  </svg>`;
}

// ── RENDER GRID ───────────────────────────────────────────────────────────────
let activeFilter = 'All';

function renderGrid(filter) {
  const grid = document.getElementById('region-grid');
  const count = document.getElementById('region-count');
  const filtered = filter === 'All' ? REGIONS : REGIONS.filter(r => r.country === filter);
  count.textContent = `Showing ${filtered.length} region${filtered.length!==1?'s':''}`;

  grid.innerHTML = filtered.map(r => {
    const tempPct = (r.temp/5)*100;
    const rainPct = (r.rain/5)*100;
    const tempCol = r.temp >= 4 ? '#8C3A1A' : '#3A5A8C';
    const rainCol = '#1A5A8C';
    const redChips = r.reds.slice(0,3).map(g=>`<span class="grape-chip red">${g}</span>`).join('');
    const whtChips = r.whites.slice(0,2).map(g=>`<span class="grape-chip white">${g}</span>`).join('');
    return `<div class="gp-card" onclick="openPanel(${REGIONS.indexOf(r)})">
      <div class="card-header">
        <div class="card-kz">Kazmi Cellars · Wine Region</div>
        <div class="card-name">${r.flag} ${r.name}</div>
        <div class="card-country">${r.country} · ${r.climate}</div>
        <div class="card-tagline">${r.tagline}</div>
      </div>
      <div class="card-body">
        <div class="card-facts">
          <div class="card-fact"><div class="fact-lbl">Latitude</div><div class="fact-val">${r.lat}</div></div>
          <div class="card-fact"><div class="fact-lbl">Elevation</div><div class="fact-val">${r.elev}</div></div>
          <div class="card-fact"><div class="fact-lbl">Rainfall</div><div class="fact-val">${r.rainfall}</div></div>
          <div class="card-fact"><div class="fact-lbl">Climate</div><div class="fact-val">${r.climate.split(' ')[0]}</div></div>
        </div>
        <div class="card-climate">
          <div class="clim-row">
            <div class="clim-lbl">Temperature</div>
            <div class="clim-track"><div class="clim-fill" style="width:${tempPct}%;background:${tempCol};"></div><div class="clim-dot" style="left:${tempPct}%;background:${tempCol};"></div></div>
          </div>
          <div class="clim-row">
            <div class="clim-lbl">Rainfall</div>
            <div class="clim-track"><div class="clim-fill" style="width:${rainPct}%;background:${rainCol};"></div><div class="clim-dot" style="left:${rainPct}%;background:${rainCol};"></div></div>
          </div>
        </div>
        <div class="card-grapes">${redChips}${whtChips}</div>
      </div>
    </div>`;
  }).join('');
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function buildFilters() {
  const bar = document.getElementById('filters');
  ['All', ...countries].forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (c === 'All' ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = c;
      renderGrid(c);
    };
    bar.appendChild(btn);
  });
}
