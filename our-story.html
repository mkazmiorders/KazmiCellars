<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Our Story — Kazmi Cellars</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .story-hero{max-width:880px;margin:0 auto 3rem;padding:0 1.5rem}
    .story-tagline{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:500;color:var(--brown-dark);line-height:1.3;margin:0 0 2rem;font-style:italic;text-align:center}
    .story-hero-image{margin:0}
    .story-hero-image img{width:100%;display:block}
    .story-hero-caption{font-size:.75rem;color:var(--text-light);letter-spacing:.08em;margin:.6rem 0 0;text-align:center;font-style:italic}
    .story-body{max-width:720px;margin:0 auto;padding:0 1.5rem 5rem;font-size:.95rem;line-height:1.9;color:var(--text-dark)}
    .story-body p{margin:0 0 1.4rem}
    .story-body h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:500;color:var(--brown-dark);margin:2.5rem 0 1rem;padding-top:1.5rem;border-top:1px solid var(--border)}
    .story-body h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:500;color:var(--brown-dark);margin:2rem 0 .8rem}
    .story-mid-image{max-width:720px;margin:2rem auto;padding:0 1.5rem}
    .story-mid-image img{width:100%;display:block}
    .loading{text-align:center;padding:4rem 2rem;color:var(--text-light);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:1.1rem}
    .error-msg{max-width:600px;margin:4rem auto;padding:0 1.5rem;text-align:center;color:var(--text-light)}
    .error-msg h3{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:500;color:var(--brown-dark);margin-bottom:.8rem}
  </style>
</head>
<body>
<script src="nav.js"></script>

  <div class="page-header">
    <div style="max-width:780px;margin:0 auto;text-align:center;">
      <p class="section-label">Who We Are</p>
      <h1 class="section-title">Our <em>Story</em></h1>
    </div>
  </div>

  <main id="storyContent">
    <div class="loading">Loading our story…</div>
  </main>

  <script>
    const POSSIBLE_PATHS = [
      'data/our-story.json',
      'data/bio.json',
      'data/story.json',
      'data/our_story.json',
      'data/ourstory.json'
    ];

    function getPhotoUrl(p) {
      if (!p) return null;
      if (typeof p === 'string') return p;
      if (p.image) return p.image;
      if (p.url) return p.url;
      if (p.src) return p.src;
      return null;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function renderInline(text) {
      return escapeHtml(text)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/__(.+?)__/g, '<strong>$1</strong>')
        .replace(/_(.+?)_/g, '<em>$1</em>');
    }

    function renderMarkdown(text) {
      if (!text) return '';
      const lines = text.split('\n');
      const out = [];
      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) continue;
        const headingMatch = line.match(/^(#{1,3})\s*(.+)$/);
        if (headingMatch) {
          const level = headingMatch[1].length;
          out.push(`<h${level}>${renderInline(headingMatch[2])}</h${level}>`);
          continue;
        }
        out.push(`<p>${renderInline(line)}</p>`);
      }
      return out.join('\n');
    }

    async function findData() {
      for (const path of POSSIBLE_PATHS) {
        try {
          const r = await fetch(path, {cache: 'no-store'});
          if (!r.ok) continue;
          const data = await r.json();
          if (data && (data.story || data.body || data.content)) return data;
        } catch (e) {}
      }
      return null;
    }

    async function loadStory() {
      const container = document.getElementById('storyContent');
      try {
        const data = await findData();
        if (!data) {
          container.innerHTML = '<div class="error-msg"><h3>Story coming soon</h3><p>Check back soon.</p></div>';
          return;
        }

        const tagline = data.title || '';
        const photos = data.photos || [];
        const heroPhoto = photos[0] ? getPhotoUrl(photos[0]) : (data.image ? getPhotoUrl(data.image) : null);
        const heroCaption = photos[0] && photos[0].caption ? photos[0].caption : '';
        const secondPhoto = photos[1] ? getPhotoUrl(photos[1]) : null;
        const secondCaption = photos[1] && photos[1].caption ? photos[1].caption : '';
        const storyText = data.story || data.body || data.content || '';

        let html = '';

        if (tagline || heroPhoto) {
          html += '<section class="story-hero">';
          if (tagline) html += `<p class="story-tagline">${escapeHtml(tagline)}</p>`;
          if (heroPhoto) {
            html += `<figure class="story-hero-image"><img src="${heroPhoto}" alt="${escapeHtml(heroCaption)}">`;
            if (heroCaption) html += `<figcaption class="story-hero-caption">${escapeHtml(heroCaption)}</figcaption>`;
            html += '</figure>';
          }
          html += '</section>';
        }

        const rendered = renderMarkdown(storyText);

        if (secondPhoto) {
          const parts = rendered.split('<h2>');
          if (parts.length > 3) {
            const mid = Math.floor(parts.length / 2);
            const photoHtml = `<figure class="story-mid-image"><img src="${secondPhoto}" alt="${escapeHtml(secondCaption)}">${secondCaption ? `<figcaption class="story-hero-caption">${escapeHtml(secondCaption)}</figcaption>` : ''}</figure>`;
            parts[mid] = photoHtml + '<h2>' + parts[mid];
            html += '<div class="story-body">' + parts.join('<h2>') + '</div>';
          } else {
            html += '<div class="story-body">' + rendered + '</div>';
            html += `<figure class="story-mid-image"><img src="${secondPhoto}" alt="${escapeHtml(secondCaption)}">${secondCaption ? `<figcaption class="story-hero-caption">${escapeHtml(secondCaption)}</figcaption>` : ''}</figure>`;
          }
        } else {
          html += '<div class="story-body">' + rendered + '</div>';
        }

        container.innerHTML = html;
      } catch (e) {
        container.innerHTML = '<div class="error-msg"><h3>Couldn\'t load the story</h3><p>Try refreshing the page.</p></div>';
      }
    }

    loadStory();
  </script>

<script src="footer.js"></script>
</body>
</html>
