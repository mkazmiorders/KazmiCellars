<style>
/* Scoped reset for the grape tool only */
.gp-hero, .gp-filters, .grid-section, .gp-overlay, .gp-panel, .gp-card { box-sizing: border-box; }
:root {
  --gp-cream: #f5f0e8; --gp-dark: #2c1810; --gp-mid: #6b3f26;
  --gp-tan: #d4c4a8; --gp-burg: #722F37; --gp-gold: #8b6914;
  --gp-goldL: #ede8dc; --gp-alt: #ede8dc;
  --gp-serif: 'Cormorant Garamond', Georgia, serif;
  --gp-sans: 'Raleway', Georgia, sans-serif;
}

/* ── PAGE HEADER (matches site) ── */
.gp-intro { font-size: .95rem; color: var(--text-mid); line-height: 1.8; max-width: 600px; margin: 1rem auto 0; text-align: center; font-family: 'Raleway', sans-serif; }

/* ── FILTERS ── */
.gp-filters { background: var(--gp-alt); border-bottom: 1px solid var(--gp-tan); padding: 14px 32px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.filter-label { font-size: 10px; font-weight: bold; letter-spacing: .15em; text-transform: uppercase; color: var(--gp-mid); margin-right: 4px; flex-shrink: 0; font-family: var(--gp-sans); }
.filter-sep { width: 1px; height: 18px; background: var(--gp-tan); margin: 0 4px; }
.filter-btn { font-family: var(--gp-sans); font-size: 11px; padding: 6px 14px; border: 1px solid var(--gp-tan); background: var(--gp-cream); color: var(--gp-mid); border-radius: 2px; cursor: pointer; transition: all .18s; letter-spacing: .04em; }
.filter-btn:hover { border-color: var(--gp-gold); color: var(--gp-dark); }
.filter-btn.active { background: var(--gp-burg); color: white; border-color: var(--gp-burg); }
.filter-btn.active.white-type { background: #1A3A5C; border-color: #1A3A5C; }

/* ── GRID ── */
.grid-section { padding: 28px 32px 48px; }
.grape-count { font-style: italic; font-size: 12px; color: var(--gp-mid); margin-bottom: 18px; font-family: var(--gp-serif); }
.gp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 18px; }

/* ── GRAPE CARD ── */
.gp-card { background: white; border: 1px solid var(--gp-tan); border-radius: 2px; overflow: hidden; cursor: pointer; transition: transform .2s, box-shadow .2s; }
.gp-card:hover { transform: translateY(-3px); box-shadow: 0 6px 24px rgba(44,26,14,.12); }
.card-header { padding: 16px 16px 14px; color: var(--gp-dark); position: relative; }
.card-kz { font-style: italic; font-size: 7.5px; color: var(--gp-gold); letter-spacing: .1em; }
.card-name { font-family: var(--gp-serif); font-weight: 600; font-size: 22px; line-height: 1.1; margin: 4px 0 3px; }
.card-badge { display: inline-block; font-size: 8px; letter-spacing: .15em; text-transform: uppercase; padding: 2px 8px; border: 1px solid var(--gp-tan); border-radius: 2px; color: var(--gp-mid); margin-bottom: 4px; font-family: var(--gp-sans); }
.card-origin { font-style: italic; font-size: 9.5px; color: var(--gp-mid); font-family: var(--gp-serif); }
.card-tagline { font-style: italic; font-size: 9px; color: var(--gp-mid); margin-top: 5px; line-height: 1.4; font-family: var(--gp-serif); }
.card-swatch { display: flex; height: 12px; }
.swatch-s { flex: 1; }
.card-body { padding: 11px 14px 12px; background: var(--gp-cream); }
.attr-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.attr-lbl { font-size: 8px; font-weight: bold; color: var(--gp-mid); width: 64px; flex-shrink: 0; font-family: var(--gp-sans); }
.attr-bars { display: flex; gap: 2px; }
.bar { width: 11px; height: 7px; border-radius: 1px; }
.attr-note { font-style: italic; font-size: 8px; color: var(--gp-mid); font-family: var(--gp-serif); }
.card-aromas { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 9px; padding-top: 8px; border-top: 1px solid var(--gp-tan); }
.a-chip { font-style: italic; font-size: 8px; color: white; padding: 2px 7px; border-radius: 2px; font-family: var(--gp-serif); }

/* ── OVERLAY + PANEL ── */
.gp-overlay { position: fixed; inset: 0; background: rgba(44,26,14,.45); z-index: 2000; opacity: 0; pointer-events: none; transition: opacity .25s; }
.gp-overlay.open { opacity: 1; pointer-events: all; }
.gp-panel { position: fixed; top: 0; right: 0; height: 100vh; width: min(660px, 100vw); background: var(--gp-cream); z-index: 2001; overflow-y: auto; transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); }
.gp-panel.open { transform: translateX(0); }
.panel-header { padding: 20px 24px 16px; color: var(--gp-dark); position: sticky; top: 0; z-index: 5; background: var(--gp-alt); border-bottom: 1px solid var(--gp-tan); }
.panel-kz { font-style: italic; font-size: 9px; color: var(--gp-gold); }
.panel-name { font-family: var(--gp-serif); font-weight: 600; font-size: 30px; line-height: 1.05; margin: 6px 0 3px; }
.panel-origin { font-style: italic; font-size: 12px; color: var(--gp-mid); font-family: var(--gp-serif); }
.panel-syn { font-style: italic; font-size: 9.5px; color: var(--gp-mid); margin-top: 3px; font-family: var(--gp-serif); }
.panel-tagline { font-style: italic; font-size: 10.5px; color: var(--gp-mid); margin-top: 6px; line-height: 1.5; font-family: var(--gp-serif); }
.panel-close { position: absolute; top: 16px; right: 20px; background: rgba(0,0,0,.06); border: none; color: var(--gp-dark); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.panel-close:hover { background: rgba(0,0,0,.12); }
.panel-swatch { display: flex; height: 18px; }
.ps-seg { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 5.5px; font-style: italic; }
.panel-body { padding: 0 24px 32px; }
.p-sec { margin-top: 20px; }
.p-sec-hdr { font-size: 8px; font-weight: bold; letter-spacing: .2em; text-transform: uppercase; color: var(--gp-gold); padding: 0 0 5px; margin: 0 0 10px; border-bottom: 1px solid var(--gp-tan); font-family: var(--gp-sans); }
.p-2col { display: grid; grid-template-columns: 1fr 1fr; }
.p-fact { padding: 7px 10px; border-bottom: 1px solid var(--gp-tan); }
.p-fact:nth-child(odd) { background: var(--gp-alt); border-right: 1px solid var(--gp-tan); }
.p-fact:nth-child(even) { background: var(--gp-cream); }
.p-lbl { font-size: 8px; font-weight: bold; color: var(--gp-mid); font-family: var(--gp-sans); }
.p-val { font-size: 10px; color: var(--gp-dark); margin-top: 2px; line-height: 1.4; font-family: var(--gp-sans); }
.story-text { font-size: 11px; line-height: 1.75; color: var(--gp-dark); text-align: justify; font-family: var(--gp-sans); }
.chip-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
.p-chip { font-style: italic; font-size: 9.5px; padding: 3px 9px; border-radius: 2px; color: white; font-family: var(--gp-serif); }
.p-chip.sub { color: var(--gp-dark); background: var(--gp-alt); border: 1px solid var(--gp-tan); }
.aroma-sec { margin-bottom: 4px; }
.aroma-tier { font-size: 7.5px; font-weight: bold; letter-spacing: .12em; text-transform: uppercase; color: var(--gp-mid); margin: 8px 0 4px; font-family: var(--gp-sans); }
.reg-row { display: flex; gap: 8px; align-items: baseline; padding: 5px 10px; border-bottom: 1px solid var(--gp-tan); }
.reg-row:nth-child(odd) { background: var(--gp-alt); }
.reg-row:nth-child(even) { background: var(--gp-cream); }
.reg-name { font-weight: bold; font-size: 9px; color: var(--gp-dark); flex-shrink: 0; font-family: var(--gp-sans); }
.reg-note { font-style: italic; font-size: 8.5px; color: var(--gp-mid); font-family: var(--gp-serif); }
.p-quote { font-style: italic; font-size: 12px; line-height: 1.6; color: var(--gp-dark); background: var(--gp-goldL); border-left: 3px solid var(--gp-gold); padding: 12px 16px; margin-top: 20px; font-family: var(--gp-serif); }
.p-download { display: inline-flex; align-items: center; gap: 7px; margin-top: 16px; padding: 10px 18px; color: white; font-size: 11px; border-radius: 2px; text-decoration: none; transition: opacity .15s; letter-spacing: .04em; font-family: var(--gp-sans); }
.p-download:hover { opacity: .88; }

@media (max-width: 640px) {
  .gp-filters, .grid-section { padding-left: 16px; padding-right: 16px; }
  .panel-body { padding: 0 16px 24px; }
}
</style>

// ── HELPERS ───────────────────────────────────────────────────────────────────
function radarSVG(scores, labels, color, size=180) {
  const cx=size/2, cy=size/2, r=size*0.34, n=scores.length;
  const pt=(i,f)=>{const a=Math.PI/2-i*2*Math.PI/n;return[cx+r*f*Math.cos(a),cy-r*f*Math.sin(a)];};
  let rings='';
  [0.25,0.5,0.75,1].forEach(f=>{
    rings+=`<polygon points="${Array.from({length:n},(_,i)=>pt(i,f).join(',')).join(' ')}" fill="none" stroke="#E0D8CE" stroke-width="0.5"/>`;
  });
  let axes='';
  for(let i=0;i<n;i++){const[x,y]=pt(i,1);axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#C8C0B8" stroke-width="0.4"/>`;}
  const dp=scores.map((s,i)=>{const f=Math.max(0.07,(s-1)/4*0.9+0.1);return pt(i,f);});
  const pp=dp.map(p=>p.join(',')).join(' ');
  const r2=parseInt(color.slice(1,3),16),g2=parseInt(color.slice(3,5),16),b2=parseInt(color.slice(5,7),16);
  const fill=`rgba(${r2},${g2},${b2},0.18)`;
  const dots=dp.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="3" fill="${color}"/>`).join('');
  const lbls=labels.map((l,i)=>{const[x,y]=pt(i,1.3);const a=x<cx-5?'end':x>cx+5?'start':'middle';return`<text x="${x}" y="${y+3}" text-anchor="${a}" font-size="7.5" font-family="Georgia" fill="#6B4C2A" font-weight="bold">${l.toUpperCase()}</text>`;}).join('');
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;margin:auto;"><polygon points="${Array.from({length:n},(_,i)=>pt(i,1).join(',')).join(' ')}" fill="#FAF7F2"/>${rings}${axes}<polygon points="${pp}" fill="${fill}" stroke="${color}" stroke-width="1.8"/>${dots}${lbls}</svg>`;
}

function attrBars(attrs, color) {
  return attrs.map(([lbl,val,note])=>`
    <div class="attr-row">
      <div class="attr-lbl">${lbl}</div>
      <div class="attr-bars">${Array.from({length:5},(_,i)=>`<div class="bar" style="background:${i<val?color:'#DDD5C8'};"></div>`).join('')}</div>
      <div class="attr-note">${note}</div>
    </div>`).join('');
}

// ── RENDER GRID ───────────────────────────────────────────────────────────────
let activeType='All', activeCountry='All';

function matchesFilter(g) {
  const typeOk = activeType==='All' || (activeType==='Red'&&g.type==='red') || (activeType==='White'&&g.type==='white');
  const countries = { France:'🇫🇷', Italy:'🇮🇹', Spain:'🇪🇸', Germany:'🇩🇪', Austria:'🇦🇹', Greece:'🇬🇷' };
  const countryOk = activeCountry==='All' || g.flag===countries[activeCountry];
  return typeOk && countryOk;
}

function renderGrid() {
  const grid=document.getElementById('grape-grid');
  const count=document.getElementById('grape-count');
  const filtered=GRAPES.filter(matchesFilter);
  count.textContent=`Showing ${filtered.length} grape${filtered.length!==1?'s':''}`;
  grid.innerHTML=filtered.map(g=>{
    const swatchHtml=g.swatch.map((c,i)=>`<div class="swatch-s" style="background:${c};"></div>`).join('');
    const aromaChips=g.aromas_primary.flatMap(([cat,aromas,col])=>aromas.slice(0,3).map(a=>`<span class="a-chip" style="background:${col};">${a}</span>`)).slice(0,6).join('');
    const isWhite=g.type==='white';
    return`<div class="gp-card" onclick="openPanel(${GRAPES.indexOf(g)})">
      <div class="card-header">
        <div class="card-kz">Kazmi Cellars · Grape Profile</div>
        <div class="card-badge">${isWhite?'White Wine':'Red Wine'}</div>
        <div class="card-name">${g.name}</div>
        <div class="card-origin">${g.flag} ${g.origin}</div>
        <div class="card-tagline">${g.tagline}</div>
      </div>
      <div class="card-swatch">${swatchHtml}</div>
      <div class="card-body">
        ${attrBars(g.attrs.slice(0,3), g.col)}
        <div class="card-aromas">${aromaChips}</div>
      </div>
    </div>`;
  }).join('');
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function buildFilters() {
  const bar=document.getElementById('filters');
  bar.innerHTML=`<span class="filter-label">Type:</span>`;
  ['All','Red','White'].forEach(t=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(t==='All'?' active':'');
    btn.textContent=t; btn.dataset.filterType='type'; btn.dataset.value=t;
    btn.onclick=()=>{
      document.querySelectorAll('[data-filter-type="type"]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); activeType=t; renderGrid();
    };
    bar.appendChild(btn);
  });
  const sep=document.createElement('div');
  sep.className='filter-sep'; bar.appendChild(sep);
  const cl=document.createElement('span');
  cl.className='filter-label'; cl.textContent='Origin:'; bar.appendChild(cl);
  ['All','France','Italy','Spain','Germany','Austria','Greece'].forEach(c=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(c==='All'?' active':'');
    btn.textContent=c; btn.dataset.filterType='country'; btn.dataset.value=c;
    btn.onclick=()=>{
      document.querySelectorAll('[data-filter-type="country"]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); activeCountry=c; renderGrid();
    };
    bar.appendChild(btn);
  });
}

        <div class="p-fact"><div class="p-lbl">Aging Potential</div><div class="p-val">${g.age}</div></div>
        <div class="p-fact"><div class="p-lbl">Peak Window</div><div class="p-val">${g.peak}</div></div>
        <div class="p-fact"><div class="p-lbl">Serve At</div><div class="p-val">${g.serve.split('·')[0].trim()}</div></div>
        <div class="p-fact"><div class="p-lbl">Decanting</div><div class="p-val">${g.decant}</div></div>
      </div>
      <div style="padding:8px 10px;background:var(--gp-alt);border-bottom:1px solid var(--gp-tan);">
        <div class="p-lbl">Famous Producers</div><div class="p-val" style="margin-top:3px;">${g.producers}</div>
      </div>
      ${g.parent?`<div style="padding:8px 10px;background:var(--gp-cream);"><div class="p-lbl">Parentage</div><div class="p-val" style="margin-top:3px;font-style:italic;">${g.parent}</div></div>`:''}
    </div>

    <div class="p-quote">"${g.quote}"</div>

    <a class="p-download" href="documents/${g.file}" target="_blank" rel="noopener" style="background:${g.col};">
      ↓ Download ${g.name} Full Profile PDF
    </a>
  `;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
  document.body.style.overflow='';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
buildFilters();
renderGrid();

// === Deep-link from search.js: open a grape panel via ?open=<slug> ===
(function () {
  const params = new URLSearchParams(window.location.search);
  const openSlug = params.get('open');
  if (!openSlug) return;
  function slug(s) { return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, ''); }
  const idx = GRAPES.findIndex(g => slug(g.name) === openSlug);
  if (idx >= 0) setTimeout(() => openPanel(idx), 50);
})();
</script>

<script src="footer.js"></script>
</body>
</html>
