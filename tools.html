function SpeakerButton({ word, lang, isPlaying, onSpeak }) {
  return (
    <button
      onClick={() => onSpeak(word, lang)}
      style={{
        background: isPlaying ? COLORS.burgundy : COLORS.cream,
        border: `1px solid ${isPlaying ? COLORS.burgundy : COLORS.border}`,
        borderRadius: "50%",
        width: 40, height: 40,
        display: "flex", alignItems: "center", justifyContent: "center",
        cursor: "pointer",
        transition: "all 0.2s ease",
        flexShrink: 0,
        padding: 0,
      }}
      title={`Hear pronunciation of ${word}`}
    >
      {isPlaying ? (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="3" height="16" rx="1" fill={COLORS.cream} opacity="0.6">
            <animate attributeName="height" values="16;8;16" dur="0.6s" repeatCount="indefinite" />
            <animate attributeName="y" values="4;8;4" dur="0.6s" repeatCount="indefinite" />
          </rect>
          <rect x="9" y="2" width="3" height="20" rx="1" fill={COLORS.cream}>
            <animate attributeName="height" values="20;10;20" dur="0.5s" repeatCount="indefinite" />
            <animate attributeName="y" values="2;7;2" dur="0.5s" repeatCount="indefinite" />
          </rect>
          <rect x="15" y="5" width="3" height="14" rx="1" fill={COLORS.cream} opacity="0.8">
            <animate attributeName="height" values="14;6;14" dur="0.7s" repeatCount="indefinite" />
            <animate attributeName="y" values="5;9;5" dur="0.7s" repeatCount="indefinite" />
          </rect>
          <rect x="21" y="7" width="3" height="10" rx="1" fill={COLORS.cream} opacity="0.5">
            <animate attributeName="height" values="10;4;10" dur="0.4s" repeatCount="indefinite" />
            <animate attributeName="y" values="7;10;7" dur="0.4s" repeatCount="indefinite" />
          </rect>
        </svg>
      ) : (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M11 5L6 9H2v6h4l5 4V5z" fill={COLORS.burgundy}/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke={COLORS.burgundy} strokeWidth="2" strokeLinecap="round"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke={COLORS.burgundy} strokeWidth="2" strokeLinecap="round" strokeOpacity="0.5"/>

}

function PronCard({ entry, isPlaying, onSpeak }) {
  return (
    <div style={{
      background: COLORS.white,
      border: `1px solid ${isPlaying ? COLORS.burgundy : COLORS.border}`,
      padding: "16px 18px",
      display: "flex", gap: 14, alignItems: "flex-start",
      transition: "all 0.2s ease",
      boxShadow: isPlaying ? `0 4px 12px rgba(114,47,55,0.15)` : "0 1px 3px rgba(60,40,20,0.04)",
    }}>
      <SpeakerButton word={entry.word} lang={entry.lang} isPlaying={isPlaying} onSpeak={onSpeak} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
          <span style={{
            fontFamily: "'Cormorant Garamond', serif",
            fontSize: 19, fontWeight: 500,
            color: COLORS.textDark,
          }}>{entry.word}</span>
          <span style={{ fontSize: 10, letterSpacing: ".15em", textTransform: "uppercase", color: COLORS.textLight, fontFamily: "'Raleway',sans-serif" }}>
            {LANG_FLAGS[entry.lang]} {LANG_NAMES[entry.lang]}
          </span>
        </div>
        <div style={{
          fontFamily: "'Courier New', monospace",
          fontSize: 12.5, color: COLORS.burgundy,
          letterSpacing: "0.06em", marginTop: 5,
          fontWeight: 600,
        }}>{entry.phonetic}</div>
        {entry.tip && (
          <div style={{
            fontSize: 12, color: COLORS.textLight,
            marginTop: 8, fontStyle: "italic",
            lineHeight: 1.5,
            fontFamily: "'Cormorant Garamond', serif",
          }}>{entry.tip}</div>
        )}
      </div>
    </div>
  );
}

  const [activeCategory, setActiveCategory] = useState("Red Grapes");
  const [search, setSearch] = useState("");
  const [playingWord, setPlayingWord] = useState(null);
  const categories = Object.keys(DATA);

  const speak = (word, lang) => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = lang;
    utterance.rate = 0.75;
    utterance.pitch = 1;
    setPlayingWord(word);
    utterance.onend = () => setPlayingWord(null);
    utterance.onerror = () => setPlayingWord(null);
    window.speechSynthesis.speak(utterance);
  };

  const allEntries = Object.entries(DATA).flatMap(([cat, entries]) =>
    entries.map(e => ({ ...e, category: cat }))
  );

  const filtered = search.trim()
    ? allEntries.filter(e =>
        e.word.toLowerCase().includes(search.toLowerCase()) ||
        e.phonetic.toLowerCase().includes(search.toLowerCase())
      )
    : DATA[activeCategory];

  const totalWords = allEntries.length;

  return (
    <div style={{
      minHeight: "100vh",
      background: COLORS.cream,
      fontFamily: "'Raleway', sans-serif",
      color: COLORS.textDark,
    }}>
      {/* Page Header — matches site .page-header style */}
      <div style={{
        background: COLORS.creamDark,
        borderBottom: `1px solid ${COLORS.border}`,
        padding: "4rem 2rem 3rem",
        textAlign: "center",
      }}>
        <p style={{
          fontFamily: "'Raleway',sans-serif",
          fontSize: ".65rem",
          fontWeight: 600,
          letterSpacing: "0.2em",
          textTransform: "uppercase",
          color: COLORS.textMid,
          marginBottom: ".8rem",
          display: "inline-flex",
          alignItems: "center",
          gap: "1rem",
        }}>
          <span style={{ display: "inline-block", width: "2rem", height: "1px", background: COLORS.goldLight }}></span>
          A Pronunciation Tool
        </p>
        <h1 style={{
          fontFamily: "'Cormorant Garamond', serif",
          fontSize: "clamp(2.2rem, 5vw, 3.2rem)",
          fontWeight: 500,
          color: COLORS.textDark,
          margin: "0 0 .6rem",
          lineHeight: 1.15,
        }}>
          Wine <em style={{ fontStyle: "italic", color: COLORS.gold }}>Pronunciation</em>
        </h1>
        <p style={{
          fontSize: ".95rem",
          color: COLORS.textMid,
          maxWidth: 560,
          margin: "0 auto 1.5rem",
          lineHeight: 1.8,
        }}>
          {totalWords} grapes, regions and terms — tap the speaker to hear each one pronounced in its native language.
        </p>

        {/* Search */}
        <div style={{ maxWidth: 460, margin: "0 auto", position: "relative" }}>
          <svg style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }}
            width="14" height="14" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="8" stroke={COLORS.textLight} strokeWidth="2"/>
            <path d="M21 21l-4.35-4.35" stroke={COLORS.textLight} strokeWidth="2" strokeLinecap="round"/>
          </svg>
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Search any word..."
            style={{
              width: "100%", padding: "12px 16px 12px 40px",
              background: COLORS.white,
              border: `1px solid ${COLORS.border}`,
              color: COLORS.textDark,
              fontSize: 14,
              fontFamily: "'Raleway',sans-serif",
              outline: "none",
              boxSizing: "border-box",
            }}
          />
        </div>
      </div>

      {/* Category Tabs */}
      {!search && (
        <div style={{
          background: COLORS.cream,
          borderBottom: `1px solid ${COLORS.border}`,
          overflowX: "auto",
          display: "flex",
          padding: "0 1rem",
          scrollbarWidth: "none",
        }}>
          <div style={{ display: "flex", gap: 0, margin: "0 auto" }}>
            {categories.map(cat => {
              const isActive = cat === activeCategory;
              const count = DATA[cat].length;
              return (
                <button key={cat} onClick={() => setActiveCategory(cat)}
                  style={{
                    padding: "1rem 1.2rem .9rem",
                    background: "none",
                    border: "none",
                    borderBottom: isActive ? `2px solid ${COLORS.burgundy}` : "2px solid transparent",
                    color: isActive ? COLORS.burgundy : COLORS.textMid,
                    fontSize: ".7rem",
                    letterSpacing: ".18em",
                    textTransform: "uppercase",
                    fontWeight: isActive ? 700 : 500,
                    cursor: "pointer",
                    whiteSpace: "nowrap",
                    fontFamily: "'Raleway',sans-serif",
                    transition: "all 0.15s ease",
                  }}>
                  {cat}
                  <span style={{
                    marginLeft: 6, fontSize: 9,
                    color: isActive ? COLORS.burgundy : COLORS.textLight,
                    opacity: 0.7,
                  }}>{count}</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {search && (
        <div style={{
          padding: "1rem 1.5rem",
          color: COLORS.textMid,
          fontSize: ".85rem",
          textAlign: "center",
          fontFamily: "'Cormorant Garamond',serif",
          fontStyle: "italic",
        }}>
          {filtered.length} result{filtered.length !== 1 ? "s" : ""} for "{search}"
          <button onClick={() => setSearch("")}
            style={{
              marginLeft: 10, color: COLORS.burgundy, background: "none",
              border: "none", cursor: "pointer", fontSize: ".75rem",
              fontWeight: 600, fontFamily: "'Raleway',sans-serif",
              letterSpacing: ".1em", textTransform: "uppercase",
            }}>
            Clear ✕
          </button>
        </div>
      )}

      {/* Cards */}
      <div style={{ padding: "2rem 1.5rem 4rem", maxWidth: 1000, margin: "0 auto" }}>
        {filtered.length === 0 ? (
          <div style={{
            textAlign: "center",
            color: COLORS.textLight,
            padding: "4rem 2rem",
            fontStyle: "italic",
            fontFamily: "'Cormorant Garamond',serif",
            fontSize: "1.1rem",
          }}>
            No results found for "{search}"
          </div>
        ) : (
          <div style={{
            display: "grid",
            gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))",
            gap: 12,
          }}>
            {filtered.map((entry, i) => (
              <PronCard
                key={`${entry.word}-${i}`}
                entry={entry}
                isPlaying={playingWord === entry.word}
                onSpeak={speak}
              />
            ))}
          </div>
        )}
      </div>

      {/* Footer note */}
      <div style={{
        textAlign: "center",
        padding: "1.5rem 1.5rem 3rem",
        color: COLORS.textLight,
        fontSize: ".85rem",
        fontStyle: "italic",
        fontFamily: "'Cormorant Garamond', serif",
        borderTop: `1px solid ${COLORS.border}`,
        maxWidth: 600,
        margin: "0 auto",
      }}>
        Pronunciations are spoken in their native language using your browser's speech engine. Quality varies by device.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('pronunciation-root'));
root.render(<PronunciationGuide />);
</script>

<script src="footer.js"></script>
</body>
</html>
