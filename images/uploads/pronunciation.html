function SpeakerButton({ word, lang, isPlaying, onSpeak }) {
  return (
    <button
      onClick={() => onSpeak(word, lang)}
      style={{
        background: isPlaying
          ? "linear-gradient(135deg, #C8860A, #E8A820)"
          : "linear-gradient(135deg, #2C1A0E, #4A2A10)",
        border: isPlaying ? "1px solid #E8A820" : "1px solid #6B4C2A",
        borderRadius: "50%",
        width: 38, height: 38,
        display: "flex", alignItems: "center", justifyContent: "center",
        cursor: "pointer",
        transition: "all 0.2s ease",
        flexShrink: 0,
        boxShadow: isPlaying ? "0 0 12px rgba(200,134,10,0.4)" : "none",
      }}
      title={`Hear pronunciation of ${word}`}
    >
      {isPlaying ? (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="4" width="3" height="16" rx="1" fill="#fff" opacity="0.6">
            <animate attributeName="height" values="16;8;16" dur="0.6s" repeatCount="indefinite" />
            <animate attributeName="y" values="4;8;4" dur="0.6s" repeatCount="indefinite" />
          </rect>
          <rect x="9" y="2" width="3" height="20" rx="1" fill="#fff">
            <animate attributeName="height" values="20;10;20" dur="0.5s" repeatCount="indefinite" />
            <animate attributeName="y" values="2;7;2" dur="0.5s" repeatCount="indefinite" />
          </rect>
          <rect x="15" y="5" width="3" height="14" rx="1" fill="#fff" opacity="0.8">
            <animate attributeName="height" values="14;6;14" dur="0.7s" repeatCount="indefinite" />
            <animate attributeName="y" values="5;9;5" dur="0.7s" repeatCount="indefinite" />
          </rect>
          <rect x="21" y="7" width="3" height="10" rx="1" fill="#fff" opacity="0.5">
            <animate attributeName="height" values="10;4;10" dur="0.4s" repeatCount="indefinite" />
            <animate attributeName="y" values="7;10;7" dur="0.4s" repeatCount="indefinite" />
          </rect>
        </svg>
      ) : (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M11 5L6 9H2v6h4l5 4V5z" fill="#C8860A"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="#C8860A" strokeWidth="2" strokeLinecap="round"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="#C8860A" strokeWidth="2" strokeLinecap="round" strokeOpacity="0.5"/>
        </svg>
      )}
    </button>
  );
}

function PronCard({ entry, catColor, isPlaying, onSpeak }) {

      border: `1px solid ${isPlaying ? "#C8860A" : "#3A2A18"}`,
      borderRadius: 10,
      padding: "14px 16px",
      display: "flex", gap: 12, alignItems: "flex-start",
      transition: "border-color 0.2s ease, box-shadow 0.2s ease",
      boxShadow: isPlaying ? "0 0 20px rgba(200,134,10,0.15)" : "0 2px 8px rgba(0,0,0,0.3)",
    }}>
      <SpeakerButton word={entry.word} lang={entry.lang} isPlaying={isPlaying} onSpeak={onSpeak} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
          <span style={{
            fontFamily: "'Georgia', serif",
            fontSize: 15, fontWeight: 700,
            color: "#F5ECD8", letterSpacing: "0.01em",
          }}>{entry.word}</span>
          <span style={{ fontSize: 11, opacity: 0.6, color: "#C8860A" }}>
            {LANG_FLAGS[entry.lang]} {LANG_NAMES[entry.lang]}
          </span>
        </div>
        <div style={{
          fontFamily: "'Courier New', monospace",
          fontSize: 12, color: "#C8860A",
          letterSpacing: "0.08em", marginTop: 3,
          background: "rgba(200,134,10,0.08)",
          display: "inline-block",
          padding: "2px 6px", borderRadius: 4,
        }}>{entry.phonetic}</div>
        {entry.tip && (
          <div style={{
            fontSize: 11, color: "#8A7060",
            marginTop: 5, fontStyle: "italic",
            lineHeight: 1.4,
          }}>💡 {entry.tip}</div>
        )}
      </div>
    </div>
  );
}

function PronunciationGuide() {
  const [activeCategory, setActiveCategory] = useState("Red Grapes");
  const [search, setSearch] = useState("");
  const [playingWord, setPlayingWord] = useState(null);
  const categories = Object.keys(DATA);

  const speak = (word, lang) => {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(word);
    utterance.lang = lang;
    utterance.rate = 0.75;
    utterance.pitch = 1;
    setPlayingWord(word);
    utterance.onend = () => setPlayingWord(null);
    utterance.onerror = () => setPlayingWord(null);
    window.speechSynthesis.speak(utterance);
  };

  const allEntries = Object.entries(DATA).flatMap(([cat, entries]) =>
    entries.map(e => ({ ...e, category: cat }))
  );

  const filtered = search.trim()
    ? allEntries.filter(e =>
        e.word.toLowerCase().includes(search.toLowerCase()) ||
        e.phonetic.toLowerCase().includes(search.toLowerCase())
      )
    : DATA[activeCategory];

  const totalWords = allEntries.length;

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(180deg, #0D0800 0%, #130E05 100%)",
      fontFamily: "'Georgia', serif",
      color: "#F5ECD8",
    }}>
      <div style={{
        background: "linear-gradient(135deg, #1A0E00, #2A1800)",
        borderBottom: "1px solid #3A2A10",
        padding: "28px 20px 20px",
        textAlign: "center",
      }}>
        <div style={{ fontSize: 11, letterSpacing: "0.3em", color: "#C8860A", marginBottom: 8, textTransform: "uppercase" }}>
          Kazmi Cellars
        </div>
        <h1 style={{
          fontSize: "clamp(22px, 5vw, 32px)",
          fontWeight: 700, margin: 0,
          color: "#F5ECD8",
          letterSpacing: "0.02em",
        }}>Wine Pronunciation Guide</h1>
        <p style={{ color: "#8A7060", fontSize: 13, margin: "8px 0 0", fontStyle: "italic" }}>
          {totalWords} grapes, regions & terms · Tap the speaker to hear the correct pronunciation
        </p>

        <div style={{ maxWidth: 420, margin: "16px auto 0", position: "relative" }}>
          <svg style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }}
            width="14" height="14" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="8" stroke="#6B4C2A" strokeWidth="2"/>
            <path d="M21 21l-4.35-4.35" stroke="#6B4C2A" strokeWidth="2" strokeLinecap="round"/>
          </svg>
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Search any word..."
            style={{
              width: "100%", padding: "10px 14px 10px 38px",
              background: "#1A1008",
              border: "1px solid #3A2A10",
              borderRadius: 8, color: "#F5ECD8",
              fontSize: 14, outline: "none",
              boxSizing: "border-box",
            }}
          />
        </div>
      </div>

      {!search && (
        <div style={{
          overflowX: "auto",
          borderBottom: "1px solid #2A1A08",
          background: "#100A00",
          padding: "0 12px",
          display: "flex", gap: 2,
          scrollbarWidth: "none",
        }}>
          {categories.map(cat => {
            const isActive = cat === activeCategory;
            const count = DATA[cat].length;
            return (
              <button key={cat} onClick={() => setActiveCategory(cat)}
                style={{
                  padding: "12px 14px 10px",
                  background: "none",
                  border: "none",
                  borderBottom: isActive ? `3px solid ${CAT_COLORS[cat] || "#C8860A"}` : "3px solid transparent",
                  color: isActive ? "#F5ECD8" : "#6B4C2A",
                  fontSize: 12, cursor: "pointer",
                  whiteSpace: "nowrap",
                  fontFamily: "'Georgia', serif",
                  transition: "all 0.15s ease",
                }}>
                {cat}
                <span style={{
                  marginLeft: 5, fontSize: 10,
                  background: isActive ? "rgba(200,134,10,0.2)" : "rgba(107,76,42,0.2)",
                  color: isActive ? "#C8860A" : "#6B4C2A",
                  borderRadius: 10, padding: "1px 5px",
                }}>{count}</span>
              </button>
            );
          })}
        </div>
      )}

      {search && (
        <div style={{ padding: "12px 16px", color: "#6B4C2A", fontSize: 12 }}>
          {filtered.length} result{filtered.length !== 1 ? "s" : ""} for "{search}"
          <button onClick={() => setSearch("")}
            style={{ marginLeft: 8, color: "#C8860A", background: "none", border: "none", cursor: "pointer", fontSize: 12 }}>
            Clear ✕
          </button>
        </div>
      )}

      <div style={{ padding: "16px", maxWidth: 900, margin: "0 auto" }}>
        {filtered.length === 0 ? (
          <div style={{ textAlign: "center", color: "#6B4C2A", padding: 40, fontStyle: "italic" }}>
            No results found for "{search}"
          </div>
        ) : (
          <div style={{
            display: "grid",
            gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))",
            gap: 10,
          }}>
            {filtered.map((entry, i) => (
              <PronCard
                key={`${entry.word}-${i}`}
                entry={entry}
                catColor={CAT_COLORS[entry.category] || CAT_COLORS[activeCategory]}
                isPlaying={playingWord === entry.word}
                onSpeak={speak}
              />
            ))}
          </div>
        )}
      </div>

      <div style={{
        textAlign: "center", padding: "20px 16px",
        color: "#4A3020", fontSize: 11, borderTop: "1px solid #1E1408",
        fontStyle: "italic",
      }}>
        Pronunciations are spoken in their native language using your browser's speech engine.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('pronunciation-root'));
root.render(<PronunciationGuide />);
</script>

<script src="footer.js"></script>
</body>
</html>
