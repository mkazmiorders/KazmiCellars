backend:
  name: github
  repo: mkazmiorders/KazmiCellars
  branch: main
  base_url: https://sveltia-cms-auth.mkazmiorders.workers.dev
  auth_endpoint: auth
media_folder: images/uploads
public_folder: /images/uploads
collections:
  - name: "bio"
    label: "Our Story"
    files:
      - label: "Bio"
        name: "bio"
        file: "data/bio.json"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Featured Photo", name: "image", widget: "image", required: false}
          - {label: "Story", name: "story", widget: "markdown"}
          - label: "Additional Photos"
            name: "photos"
            widget: "list"
            required: false
            fields:
              - {label: "Image", name: "image", widget: "image"}
              - {label: "Caption", name: "caption", widget: "string", required: false}
  - name: "wineries"
    label: "Winery Experiences"
    files:
      - label: "All Wineries"
        name: "wineries"
        file: "data/wineries.json"
        fields:
          - label: "Wineries"
            name: "wineries"
            widget: "list"
            fields:
              - {label: "Winery Name", name: "name", widget: "string"}
              - {label: "Location", name: "location", widget: "string"}
              - {label: "Short Excerpt", name: "excerpt", widget: "text"}
              - {label: "Full Experience", name: "review", widget: "text", required: false}
              - {label: "Photos", name: "photos", widget: "image", multiple: true, required: false}
  - name: "regions"
    label: "Region Experiences"
    files:
      - label: "All Regions"
        name: "regions"
        file: "data/regions.json"
        fields:
          - label: "Regions"
            name: "regions"
            widget: "list"
            fields:
              - {label: "Region Name", name: "name", widget: "string"}
              - {label: "Country", name: "country", widget: "string"}
              - {label: "Short Excerpt", name: "excerpt", widget: "text"}
              - {label: "Full Experience", name: "review", widget: "text", required: false}
              - {label: "Photos", name: "photos", widget: "image", multiple: true, required: false}
  - name: "restaurants"
    label: "Restaurant Experiences"
    files:
      - label: "All Restaurants"
        name: "restaurants"
        file: "data/restaurants.json"
        fields:
          - label: "Restaurants"
            name: "restaurants"
            widget: "list"
            fields:
              - {label: "Restaurant Name", name: "name", widget: "string"}
              - {label: "Location", name: "location", widget: "string"}
              - {label: "Short Excerpt", name: "excerpt", widget: "text"}
              - {label: "Full Experience", name: "review", widget: "text", required: false}
              - {label: "Photos", name: "photos", widget: "image", multiple: true, required: false}
  - name: "bottles"
    label: "This Week's Bottles"
    files:
      - label: "All Bottles"
        name: "bottles"
        file: "data/bottles.json"
        fields:
          - label: "Bottles"
            name: "bottles"
            widget: "list"
            fields:
              - {label: "Week", name: "week", widget: "string"}
              - {label: "Wine Name", name: "name", widget: "string"}
              - {label: "Vintage", name: "vintage", widget: "string"}
              - {label: "Region", name: "region", widget: "string"}
              - {label: "Tasting Notes", name: "notes", widget: "text"}
              - {label: "Bottle Photo", name: "image", widget: "image", required: false}
  - name: "posts"
    label: "Posts"
    files:
      - label: "All Posts"
        name: "posts"
        file: "data/posts.json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Date", name: "date", widget: "datetime"}
              - {label: "Featured Image", name: "image", widget: "image", required: false}
              - {label: "Body", name: "body", widget: "markdown"}
  - name: "gallery"
    label: "Photo Gallery"
    files:
      - label: "All Photos"
        name: "gallery"
        file: "data/gallery.json"
        fields:
          - label: "Photos"
            name: "photos"
            widget: "list"
            fields:
              - {label: "Image", name: "image", widget: "image"}
              - {label: "Caption", name: "caption", widget: "string", required: false}
              - {label: "Category", name: "category", widget: "string", required: false}

              - name: "maiden-series"
    label: "Maiden Series"
    file: "data/maiden-series.json"
    fields:
      - {label: "Intro", name: "intro", widget: "text", required: false}
      - label: "Poems"
        name: "poems"
        widget: "list"
        fields:
          - {label: "Part (e.g., I, II, III)", name: "part", widget: "string", required: false}
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Date", name: "date", widget: "datetime", required: false}
          - {label: "Image", name: "image", widget: "image", required: false}
          - {label: "Body", name: "body", widget: "markdown"}

  - name: "between-pours"
    label: "Between Pours"
    file: "data/between-pours.json"
    fields:
      - {label: "Intro", name: "intro", widget: "text", required: false}
      - label: "Poems"
        name: "poems"
        widget: "list"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Date", name: "date", widget: "datetime", required: false}
          - {label: "Image", name: "image", widget: "image", required: false}
          - {label: "Body", name: "body", widget: "markdown"}
