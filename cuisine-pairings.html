<style>
*,*::before,*::after{box-sizing:border-box}

/* ---- Cuisine tabs: mirror the in-card tab style on the pairing page ---- */
.cuisine-nav{background:var(--cream);border-bottom:1px solid var(--border);padding:0 1rem;display:flex;overflow-x:auto;gap:.4rem;-webkit-overflow-scrolling:touch}
.cuisine-nav::-webkit-scrollbar{height:3px}
.cuisine-nav::-webkit-scrollbar-thumb{background:var(--border)}
.cuis-tab{flex-shrink:0;padding:1rem .9rem .8rem;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.18rem;color:var(--text-mid);cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap}
.cuis-tab:hover{color:var(--text-dark)}
.cuis-tab.active{color:var(--burgundy);border-bottom-color:var(--burgundy);font-weight:500}

/* ---- Wine-type filter row: mirror site .filter-btn pills ---- */
.filters{background:var(--cream);padding:1.2rem 2rem;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;border-bottom:1px solid var(--border);max-width:1120px;margin:0 auto}
.filter-label{font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-right:.3rem}
.filter-btn{border:1px solid var(--border);background:transparent;padding:.42rem .95rem;font-family:'Raleway',sans-serif;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;color:var(--text-dark);transition:all .2s;font-weight:500;border-radius:2px}
.filter-btn:hover,.filter-btn.active{background:var(--brown-dark);color:#fff;border-color:var(--brown-dark)}
.result-count{margin-left:auto;font-style:italic;font-size:.78rem;color:var(--text-mid)}

/* ---- Dish grid + light cards (mirror site cards) ---- */
.grid-section{padding:2.5rem 2rem 4rem;max-width:1120px;margin:0 auto}
.dish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem;align-items:start}
.dish-card{background:var(--white);border:1px solid var(--border);cursor:pointer;transition:box-shadow .2s,transform .2s;display:flex;flex-direction:column}
.dish-card:hover{box-shadow:0 6px 20px rgba(60,40,20,.08);transform:translateY(-2px);border-color:var(--gold-light)}
.dc-header{padding:1.4rem 1.4rem .4rem}
.dc-emoji{font-size:1.8rem;display:block;line-height:1;margin-bottom:.5rem}
.dc-name{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.5rem;line-height:1.15;color:var(--text-dark);margin-bottom:.35rem}
.dc-desc{font-style:italic;font-size:.82rem;color:var(--brown-light);line-height:1.5}
.dc-body{padding:0 1.4rem 1.4rem}
.dc-flavors{display:flex;flex-wrap:wrap;gap:.35rem;margin:.9rem 0 1.1rem}
.flavor-chip{font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;padding:.26rem .7rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-mid);font-weight:600;white-space:nowrap}
.wines-label{font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.6rem}
.dc-wines{border:1px solid var(--border);background:var(--cream)}
.wine-row{display:flex;align-items:center;gap:.7rem;padding:.7rem .9rem;border-bottom:1px solid var(--border)}
.wine-row:last-child{border-bottom:none}
.wine-badge{font-size:.55rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.26rem .6rem;border-radius:4px;color:#fff;white-space:nowrap;flex-shrink:0}
.wine-nm{font-size:.82rem;font-style:italic;color:var(--text-dark);line-height:1.3}

/* ---- Slide-out detail panel (light) ---- */
.overlay{position:fixed;inset:0;background:rgba(20,12,6,.45);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.panel{position:fixed;top:0;right:0;height:100vh;width:min(680px,100vw);background:var(--cream);z-index:201;overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}

.p-sec::before{content:'';width:2rem;height:1px;background:var(--gold-light);flex-shrink:0}
.flavors-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.5rem}
.p-flavor{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.3rem .8rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-mid);font-weight:600}
.principle-box{background:var(--cream-dark);border-left:3px solid var(--gold);padding:1rem 1.2rem;margin-bottom:.5rem}
.pb-title{font-weight:600;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
.pb-text{font-style:italic;font-size:.86rem;color:var(--text-mid);line-height:1.6}
.pairing-card{background:var(--white);border:1px solid var(--border);margin-bottom:.9rem}
.pc-hdr{padding:1rem 1.2rem .7rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
.pc-badge{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:.26rem .6rem;border-radius:4px;color:#fff;flex-shrink:0;font-weight:700}
.pc-wine{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:1.3rem;color:var(--text-dark);flex:1;line-height:1.2;min-width:140px}
.pc-serve{font-style:italic;font-size:.7rem;color:var(--brown-light);white-space:nowrap}
.pc-body{padding:.4rem 1.2rem 1.1rem}
.pc-why-lbl{font-size:.58rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.4rem}
.pc-why{font-size:.86rem;color:var(--text-mid);line-height:1.65}
.pc-pr{display:inline-block;margin-top:.6rem;font-style:italic;font-size:.72rem;color:var(--gold);background:var(--cream-dark);padding:.3rem .7rem;border-radius:2px;border-left:2px solid var(--gold)}
.pairings-intro{font-family:'Raleway',sans-serif;font-size:.95rem;color:var(--text-mid);line-height:1.8;max-width:600px;margin:1rem auto 0;text-align:center}
@media(max-width:640px){
  .grid-section{padding:1.5rem 1rem 3rem}
  .filters{padding:1rem}
  .panel-hdr{padding:1.5rem 1.2rem 1.2rem}
  .panel-body{padding:1.2rem 1.2rem 2rem}
  .dish-grid{grid-template-columns:1fr}
}
</style>

const TB={red:"#722F37",white:"#3F5E6E",rose:"#9C4452",sparkling:"#A07A14"};
const TL={red:"Red",white:"White",rose:"Ros\u00e9",sparkling:"Sparkling"};
const FC={"Spicy": "#8C2010", "Rich": "#6B3A10", "Umami": "#4A3A2A", "Bright": "#2A5A2A", "Acidic": "#1A5A3A", "Herbal": "#2A5A10", "Creamy": "#6B5A20", "Sweet": "#6B3A00", "Smoky": "#3A3A3A", "Savoury": "#5A3A1A", "Delicate": "#2A3A5A", "Earthy": "#5A4A2A", "Crispy": "#7A5A20", "Fatty": "#8C6A30", "Tangy": "#3A6A2A", "Aromatic": "#5A2A5A", "Fermented": "#4A3A2A", "Nutty": "#6B4A20", "Varied": "#3A3A5A", "Coconut": "#5A5A2A", "Mild": "#3A5A3A", "Classic": "#3A3A5A", "Comforting": "#5A3A2A", "Indulgent": "#4A1A1A", "Complex": "#3A2A5A", "Deep": "#2A1A3A", "Saline": "#1A3A5A", "Silky": "#4A3A5A", "Communal": "#5A2A3A", "Seasonal": "#4A5A2A", "Clean": "#1A4A5A", "Chocolate": "#3A1A10", "Sweet-Sour": "#5A3A10", "Numbing": "#3A2A5A", "Tropical": "#2A5A1A", "Honey": "#7A5A10", "Floral": "#5A2A5A", "Warming": "#6A3A10", "Peppery": "#4A3A1A", "Charred": "#2A2A2A", "Braised": "#5A3A1A", "Bitter": "#3A3A3A", "Light": "#3A4A5A", "Boozy": "#5A1A3A", "Vanilla": "#7A6A20", "Caramel": "#7A5A10", "Flaky": "#7A6A40", "Buttery": "#8A7030", "Refreshing": "#1A5A4A", "Fruity": "#5A2A10", "Dense": "#4A3A2A", "Chewy": "#5A4A2A", "Sweet-Savoury": "#5A4A10", "Cheese": "#6A5A10", "Turmeric": "#8A6010", "Sweet-Salty": "#6A4A10", "Juicy": "#4A5A2A"};
function fc(f){return FC[f]||"#6B4C2A"}
let aC=0,aT="All";
function buildNav(){
  const nav=document.getElementById("cuisine-nav");
  CUISINES.forEach((c,i)=>{
    const b=document.createElement("button");
    b.className="cuis-tab"+(i===aC?" active":"");
    b.textContent=c.flag+" "+c.name;
    b.onclick=()=>{document.querySelectorAll(".cuis-tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");aC=i;renderGrid();};
    nav.appendChild(b);
  });
}
function buildFilters(){
  const bar=document.getElementById("filters");
  [["All","f-all"],["Red","f-red"],["White","f-white"],["Ros\u00e9","f-rose"],["Sparkling","f-spark"]].forEach(([t,cls])=>{
    const b=document.createElement("button");
    b.className="filter-btn "+(t==="All"?" active":"");
    b.textContent=t;
    b.onclick=()=>{document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");aT=t;renderGrid();};
    bar.appendChild(b);
  });
  const cnt=document.createElement("span");cnt.className="result-count";cnt.id="rc";bar.appendChild(cnt);
}
function matches(d){
  if(aT==="All")return true;
  const m={Red:"red",White:"white","Ros\u00e9":"rose",Sparkling:"sparkling"};
  return d.p.some(p=>p.t===m[aT]);
}
function renderGrid(){
  const c=CUISINES[aC];
  const filtered=c.dishes.filter(matches);
  document.getElementById("rc").textContent=filtered.length+" dish"+(filtered.length!==1?"es":"");
  document.getElementById("dish-grid").innerHTML=filtered.map(d=>{
    const idx=c.dishes.indexOf(d);
    const chips=d.f.map(f=>`<span class="flavor-chip">${f}</span>`).join("");
    const rows=d.p.map(p=>`<div class="wine-row"><span class="wine-badge" style="background:${TB[p.t]}">${TL[p.t]||p.t}</span><span class="wine-nm">${p.w}</span></div>`).join("");
    return `<div class="dish-card" onclick="openPanel(${aC},${idx})">
      <div class="dc-header">
        <span class="dc-emoji">${d.e}</span>
        <div class="dc-name">${d.n}</div>
        <div class="dc-desc">${d.d}</div>
      </div>
      <div class="dc-body">
        <div class="dc-flavors">${chips}</div>
        <div class="wines-label">3 Wine Pairings</div>
        <div class="dc-wines">${rows}</div>
      </div>
    </div>`;
  }).join("");
}
function openPanel(ci,di){
  const c=CUISINES[ci],d=c.dishes[di];
  document.getElementById("ph-e").textContent=d.e;
  document.getElementById("ph-n").textContent=d.n;
  document.getElementById("ph-c").textContent=c.flag+" "+c.name;
  document.getElementById("ph-d").textContent=d.d;
  const fl=d.f.map(f=>`<span class="p-flavor">${f}</span>`).join("");
  const pr0=PR[d.p[0].pr]||{};
  const cards=d.p.map(p=>{
    const pr=PR[p.pr]||{};
    return `<div class="pairing-card">
      <div class="pc-hdr">
        <span class="pc-badge" style="background:${TB[p.t]}">${TL[p.t]||p.t}</span>
        <div class="pc-wine">${p.w}</div>
        <div class="pc-serve">${p.s}</div>
      </div>
      <div class="pc-body">
        <div class="pc-why-lbl">Why it works</div>
        <div class="pc-why">${p.y}</div>
        ${pr.title?`<div class="pc-pr">\u25c6 ${pr.title}</div>`:""}
      </div>
    </div>`;
  }).join("");
  document.getElementById("panel-body").innerHTML=`
    <div class="p-sec">FLAVOUR PROFILE</div>
    <div class="flavors-row">${fl}</div>
    ${pr0.title?`<div class="principle-box"><div class="pb-title">\u25c6 Pairing Principle: ${pr0.title}</div><div class="pb-text">${pr0.text}</div></div>`:""}
    <div class="p-sec">OUR 3 PAIRING PICKS</div>
    ${cards}
    <div class="p-sec">THE DISH</div>
    <p style="font-size:10px;line-height:1.7;font-style:italic">${d.d}</p>
  `;
  document.getElementById("overlay").classList.add("open");
  document.getElementById("panel").classList.add("open");
  document.body.style.overflow="hidden";
}
function closePanel(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("panel").classList.remove("open");
  document.body.style.overflow="";
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closePanel();});
try{(function(){try{var q=new URLSearchParams(window.location.search);var cn=q.get("cuisine");if(cn){var ci=CUISINES.findIndex(function(c){return c.name.toLowerCase()===cn.toLowerCase();});if(ci>=0)aC=ci;}}catch(e){}})();buildNav();buildFilters();renderGrid();(function(){try{var q=new URLSearchParams(window.location.search);var dn=q.get("dish");if(dn){var di=CUISINES[aC].dishes.findIndex(function(d){return d.n.toLowerCase()===dn.toLowerCase();});if(di>=0)openPanel(aC,di);}}catch(e){}})();}catch(err){var g=document.getElementById("dish-grid");if(g){g.innerHTML='<p style="padding:2rem;color:#722F37;font-family:Raleway,sans-serif;font-size:.95rem;line-height:1.6">Tool failed to load: '+(err&&err.message?err.message:err)+'</p>';}console.error(err);}
</script>
