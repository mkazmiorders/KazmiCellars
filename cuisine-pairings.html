<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--kc-cream:#FAF7F2;--kc-dark:#2C1A0E;--kc-mid:#6B4C2A;--kc-tan:#D9C8A8;--kc-burg:#5C1A1A;--kc-gold:#C8860A;--kc-goldL:#FFF4E0;--kc-alt:#F3EDE5;--kc-serif:'Cormorant Garamond',Georgia,serif}
body{font-family:'Raleway',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--kc-cream);color:var(--kc-dark);min-height:100vh}
.hero{background:var(--kc-burg);padding:48px 32px 40px;text-align:center;border-bottom:3px solid var(--kc-gold)}

.cuisine-nav{background:#F3EDE5;border-bottom:2px solid var(--kc-tan);padding:0 16px;display:flex;overflow-x:auto;gap:0;-webkit-overflow-scrolling:touch}

.cuis-tab{flex-shrink:0;padding:13px 14px 11px;font-style:italic;font-size:11px;color:var(--kc-mid);cursor:pointer;border-bottom:3px solid transparent;transition:all .18s;white-space:nowrap;background:none;border-left:none;border-right:none;border-top:none}
.cuis-tab:hover{color:var(--kc-dark)}.cuis-tab.active{color:var(--kc-burg);border-bottom-color:var(--kc-burg);font-weight:700}
.filters{background:var(--kc-alt);border-bottom:1px solid var(--kc-tan);padding:10px 24px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filter-label{font-size:9.5px;font-weight:bold;letter-spacing:.16em;text-transform:uppercase;color:var(--kc-mid);margin-right:4px}
.filter-btn{font-family:'Raleway',sans-serif;font-style:italic;font-size:11px;padding:5px 14px;border:1px solid var(--kc-tan);background:var(--kc-cream);color:var(--kc-mid);border-radius:2px;cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--kc-gold)}.filter-btn.active{background:var(--kc-burg);color:white;border-color:var(--kc-burg)}
.result-count{margin-left:auto;font-style:italic;font-size:10px;color:var(--kc-mid)}
.grid-section{padding:24px 24px 48px}
.dish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;align-items:start}
/* CARD */
.dish-card{background:white;border:1px solid var(--kc-tan);border-radius:3px;cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}

.dc-header{padding:14px 14px 12px;color:white;border-radius:3px 3px 0 0;overflow:hidden;flex-shrink:0}
.dc-emoji{font-size:24px;margin-bottom:6px;display:block;line-height:1}
.dc-name{font-family:var(--kc-serif);font-weight:700;font-size:15px;line-height:1.2;margin-bottom:4px}
.dc-desc{font-style:italic;font-size:9px;color:rgba(255,255,255,.6);line-height:1.4}
.dc-body{padding:11px 13px 13px;background:var(--kc-cream);border-radius:0 0 3px 3px;flex:1}
.dc-flavors{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px}
.flavor-chip{font-size:7.5px;padding:2px 7px;border-radius:2px;color:white;font-style:italic;white-space:nowrap}
/* 3 WINE ROWS — clearly visible */
.wines-label{font-size:8px;font-weight:bold;letter-spacing:.14em;text-transform:uppercase;color:var(--kc-mid);margin-bottom:5px}
.dc-wines{border:1px solid var(--kc-tan);border-radius:2px;background:white}
.wine-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--kc-tan)}
.wine-row:last-child{border-bottom:none}
.wine-badge{font-size:7px;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;border-radius:2px;color:white;white-space:nowrap;flex-shrink:0}
.wine-nm{font-size:10px;font-style:italic;color:var(--kc-dark);line-height:1.3}

.overlay{position:fixed;inset:0;background:rgba(44,26,14,.4);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.panel{position:fixed;top:0;right:0;height:100vh;width:min(680px,100vw);background:var(--kc-cream);z-index:201;overflow-y:auto;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}

.panel-hdr{padding:20px 24px 16px;color:white;position:sticky;top:0;z-index:5}
.panel-kz{font-style:italic;font-size:9px;color:var(--kc-gold);letter-spacing:.1em}
.panel-emoji{font-size:34px;margin:6px 0 4px;display:block;line-height:1}
.panel-name{font-family:var(--kc-serif);font-weight:900;font-size:26px;line-height:1.1;margin-bottom:4px}
.panel-cuisine{font-style:italic;font-size:10px;color:rgba(255,255,255,.65)}

.p-close{position:absolute;top:16px;right:20px;background:rgba(255,255,255,.15);border:none;color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}
.p-close:hover{background:rgba(255,255,255,.25)}
.panel-body{padding:0 24px 32px}
.p-sec{font-size:8px;font-weight:bold;letter-spacing:.2em;text-transform:uppercase;color:white;padding:5px 10px 4px;margin:20px -24px 12px}
.flavors-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.p-flavor{font-style:italic;font-size:9px;padding:3px 9px;border-radius:2px;color:white}
.principle-box{background:var(--kc-goldL);border-left:3px solid var(--kc-gold);padding:10px 14px;margin-bottom:4px}
.pb-title{font-weight:bold;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--kc-gold);margin-bottom:4px}
.pb-text{font-style:italic;font-size:9px;color:var(--kc-dark);line-height:1.6}
.pairing-card{background:white;border:1px solid var(--kc-tan);border-radius:2px;margin-bottom:10px;overflow:hidden}
.pc-hdr{padding:10px 14px 8px;color:white;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.pc-badge{font-size:7px;letter-spacing:.15em;text-transform:uppercase;padding:2px 8px;border-radius:2px;border:1px solid rgba(255,255,255,.35);color:rgba(255,255,255,.85);flex-shrink:0}
.pc-wine{font-family:var(--kc-serif);font-weight:700;font-size:16px;flex:1;line-height:1.2}
.pc-serve{font-style:italic;font-size:8px;color:rgba(255,255,255,.55);white-space:nowrap}
.pc-body{padding:10px 14px 12px;background:var(--kc-cream)}
.pc-why-lbl{font-size:7.5px;font-weight:bold;letter-spacing:.12em;text-transform:uppercase;color:var(--kc-mid);margin-bottom:5px}
.pc-why{font-size:9.5px;color:var(--kc-dark);line-height:1.6}
.pc-pr{display:inline-block;margin-top:7px;font-style:italic;font-size:8px;color:var(--kc-gold);background:var(--kc-goldL);padding:2px 8px;border-radius:2px;border-left:2px solid var(--kc-gold)}
@media(max-width:640px){
  .grid-section{padding:16px 16px 40px}
  .hero{padding:32px 16px 28px}
  .filters{padding:8px 16px}
  .panel-body{padding:0 16px 24px}
  .p-sec{margin-left:-16px;margin-right:-16px}
  .dish-grid{grid-template-columns:1fr}
}
.pairings-intro{font-family:'Raleway',sans-serif;font-size:.95rem;color:var(--kc-mid);line-height:1.7;max-width:600px;margin:1rem auto 0;text-align:center}
</style>

  "match-weight":{"title":"Match the Weight","text":"Light dishes need light wines; rich, heavy dishes need wines with body and structure. A delicate steamed fish disappears under a full-bodied red."},
